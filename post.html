<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Post — Modly Blog</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/minecraftmodstudio/mmsblog/main/mmslogosimbolodc.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
:root{
  --green:#6ab84a;--green-dk:#3a7a20;--green-lt:#9de070;
  --bg:#111111;--bg2:#171717;--bg3:#1e1e1e;
  --border:#2a2a2a;--text:#e0e0e0;--muted:#606060;
  --amber:#c89040;--blue:#4a90d9;--red:#d94a4a;--purple:#9b59b6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(106,184,74,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(106,184,74,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;background:rgba(17,17,17,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:26px;height:26px;object-fit:contain}
.nav-logo-text{display:flex;flex-direction:column;line-height:1.1}
.nav-logo-main{font-weight:700;font-size:13px;color:var(--text)}
.nav-logo-sub{font-size:10px;color:var(--green);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-back{color:var(--muted);text-decoration:none;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;transition:color .2s}
.nav-back:hover{color:var(--text)}
.lang-switcher{position:relative}
.lang-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;transition:border-color .2s}
.lang-btn:hover{border-color:#444}
.lang-dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:200}
.lang-switcher.open .lang-dropdown{display:block}
.lang-option{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:12px;transition:background .15s}
.lang-option:hover{background:rgba(255,255,255,.05)}
.lang-option.active{color:var(--green)}
.lang-option.unavailable{opacity:.35;cursor:default;pointer-events:none}

/* available langs strip */
.post-langs-strip{display:flex;align-items:center;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.post-lang-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:4px 12px;border-radius:100px;cursor:pointer;transition:all .15s;font-family:inherit}
.post-lang-btn:hover{border-color:#444;color:var(--text)}
.post-lang-btn.active{background:rgba(74,144,217,.12);border-color:rgba(74,144,217,.4);color:var(--blue)}
.post-langs-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}

.page-wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:56px 40px 96px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:40px;font-family:'JetBrains Mono',monospace}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s}
.breadcrumb a:hover{color:var(--green)}
.breadcrumb span{color:#333}

.post-header{margin-bottom:40px;animation:fadeUp .5s ease both}
.post-meta{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.post-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 11px;border-radius:100px}
.post-tag.guide{background:rgba(106,184,74,.12);color:var(--green);border:1px solid rgba(106,184,74,.25)}
.post-tag.update{background:rgba(200,144,64,.12);color:var(--amber);border:1px solid rgba(200,144,64,.25)}
.post-tag.news{background:rgba(74,144,217,.12);color:var(--blue);border:1px solid rgba(74,144,217,.25)}
.post-tag.devlog{background:rgba(217,74,74,.12);color:var(--red);border:1px solid rgba(217,74,74,.25)}
.post-tag.release{background:rgba(106,184,74,.2);color:var(--green-lt);border:1px solid rgba(106,184,74,.4)}
.post-tag.custom{background:rgba(155,89,182,.12);color:var(--purple);border:1px solid rgba(155,89,182,.25)}
.post-date{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.post-title{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-1px;color:#fff;line-height:1.1;margin-bottom:16px}
.post-excerpt{font-size:1.05rem;color:#777;line-height:1.7;font-family:'Lora',serif}
.post-author{display:flex;align-items:center;gap:10px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.post-author-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--bg3);border:1px solid var(--border);flex-shrink:0}
.post-author-avatar img{width:100%;height:100%;object-fit:cover}
.post-author-info{font-size:12px}
.post-author-name{color:var(--text);font-weight:600}
.post-author-role{color:var(--muted);font-size:11px}

.post-banner{margin-bottom:40px;border-radius:12px;overflow:hidden;border:1px solid var(--border);animation:fadeUp .5s .1s ease both}
.post-banner img{width:100%;display:block;max-height:400px;object-fit:cover}

.post-body{animation:fadeUp .5s .15s ease both;font-size:.95rem;line-height:1.85;color:#aaa}
.post-body h1,.post-body h2,.post-body h3,.post-body h4{color:#fff;font-weight:700;letter-spacing:-.3px;margin:2em 0 .6em}
.post-body h1{font-size:1.7rem;border-bottom:1px solid var(--border);padding-bottom:.4em}
.post-body h2{font-size:1.3rem}
.post-body h3{font-size:1.1rem;color:#ddd}
.post-body p{margin-bottom:1.2em}
.post-body a{color:var(--green);text-decoration:none;border-bottom:1px solid rgba(106,184,74,.3);transition:border-color .2s}
.post-body a:hover{border-color:var(--green)}
.post-body ul,.post-body ol{padding-left:1.5em;margin-bottom:1.2em}
.post-body li{margin-bottom:.4em}
.post-body strong{color:#ddd;font-weight:600}
.post-body em{font-style:italic;color:#bbb}
.post-body blockquote{border-left:3px solid var(--green);padding:12px 20px;margin:1.5em 0;background:rgba(106,184,74,.05);border-radius:0 8px 8px 0;color:#888;font-style:italic}
.post-body code{font-family:'JetBrains Mono',monospace;font-size:.82em;background:var(--bg3);border:1px solid var(--border);padding:2px 6px;border-radius:4px;color:var(--green-lt)}
.post-body pre{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin:1.5em 0;overflow-x:auto}
.post-body pre code{background:none;border:none;padding:0;font-size:.88em;color:#ccc}
.post-body img{max-width:100%;border-radius:8px;margin:1em 0;border:1px solid var(--border)}
.post-body hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.post-body table{width:100%;border-collapse:collapse;margin:1.5em 0;font-size:.88em}
.post-body th{background:var(--bg3);color:#ccc;font-weight:600;padding:10px 14px;text-align:left;border:1px solid var(--border)}
.post-body td{padding:9px 14px;border:1px solid var(--border);color:#888}
.post-body tr:nth-child(even) td{background:rgba(255,255,255,.015)}

/* translation notice */
.translation-notice{background:rgba(74,144,217,.06);border:1px solid rgba(74,144,217,.2);border-radius:8px;padding:12px 16px;margin-bottom:24px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px}

.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;margin-top:48px;padding:10px 18px;border:1px solid var(--border);border-radius:8px;transition:all .2s}
.back-link:hover{border-color:#444;color:var(--text);background:var(--bg2)}

.skeleton{animation:shimmer 1.5s infinite;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-line{height:14px;margin-bottom:12px}
.error-box{background:rgba(217,74,74,.08);border:1px solid rgba(217,74,74,.2);border-radius:10px;padding:24px;text-align:center;color:#d94a4a;font-size:14px}

footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-logo{display:flex;align-items:center;gap:8px}
.footer-logo img{width:18px;height:18px;object-fit:contain;opacity:.5}
.footer-logo span{font-size:12px;color:#3a3a3a;font-weight:600}
footer p{font-size:11px;color:#333}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  nav{padding:0 20px}
  .page-wrap{padding:40px 20px 80px}
  footer{padding:24px 20px;flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <img src="https://raw.githubusercontent.com/minecraftmodstudio/mmsblog/main/mmslogosimbolodc.png" alt="MMS" />
    <div class="nav-logo-text">
      <span class="nav-logo-main">Modly</span>
      <span class="nav-logo-sub">Blog</span>
    </div>
  </a>
  <div class="nav-right">
    <a class="nav-back" href="index.html">← Blog</a>
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn" onclick="toggleLang()">
        <span id="currentFlag">🇧🇷</span><span id="currentLangLabel">PT</span>
        <span style="font-size:10px;color:var(--muted)">▾</span>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <div class="lang-option active" data-lang="pt" onclick="setLang('pt')">🇧🇷 &nbsp;Português</div>
        <div class="lang-option" data-lang="en" onclick="setLang('en')">🇺🇸 &nbsp;English</div>
        <div class="lang-option" data-lang="es" onclick="setLang('es')">🇪🇸 &nbsp;Español</div>
        <div class="lang-option" data-lang="fr" onclick="setLang('fr')">🇫🇷 &nbsp;Français</div>
        <div class="lang-option" data-lang="de" onclick="setLang('de')">🇩🇪 &nbsp;Deutsch</div>
      </div>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <div class="breadcrumb">
    <a href="../index.html">mmswebsite</a><span>/</span>
    <a href="index.html">blog</a><span>/</span>
    <span id="breadSlug">…</span>
  </div>
  <div id="postContent">
    <div class="post-header">
      <div class="skel-line skeleton" style="width:20%;height:22px;margin-bottom:20px"></div>
      <div class="skel-line skeleton" style="width:90%;height:36px"></div>
      <div class="skel-line skeleton" style="width:70%;height:36px"></div>
      <div class="skel-line skeleton" style="width:80%;height:18px;margin-top:16px"></div>
      <div class="skel-line skeleton" style="width:60%;height:18px"></div>
    </div>
    <div class="skel-line skeleton" style="height:260px;border-radius:12px;margin-bottom:40px"></div>
    <div class="skel-line skeleton" style="width:100%"></div>
    <div class="skel-line skeleton" style="width:90%"></div>
    <div class="skel-line skeleton" style="width:95%"></div>
    <div class="skel-line skeleton" style="width:80%"></div>
  </div>
</div>

<footer>
  <div class="footer-logo">
    <img src="https://raw.githubusercontent.com/minecraftmodstudio/mmsblog/main/mmslogosimbolodc.png" alt="Logo" />
    <span>Modly Blog</span>
  </div>
  <p id="footerCopy">Não afiliado à Mojang/Microsoft</p>
</footer>

<script>
const GITHUB_USER='minecraftmodstudio',GITHUB_REPO='mmsblog',POSTS_PATH='posts';
const RAW_BASE=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${POSTS_PATH}`;

const i18n={
  pt:{footer:'Não afiliado à Mojang/Microsoft',notfound:'Post não encontrado.',err:'Erro ao carregar o post.',back:'← Voltar ao Blog',translationNotice:'Este post está disponível em outros idiomas:',noTranslation:'Conteúdo não disponível neste idioma. Exibindo em:'},
  en:{footer:'Not affiliated with Mojang/Microsoft',notfound:'Post not found.',err:'Error loading post.',back:'← Back to Blog',translationNotice:'This post is available in other languages:',noTranslation:'Content not available in this language. Showing in:'},
  es:{footer:'No afiliado a Mojang/Microsoft',notfound:'Post no encontrado.',err:'Error al cargar el post.',back:'← Volver al Blog',translationNotice:'Este post está disponible en otros idiomas:',noTranslation:'Contenido no disponible en este idioma. Mostrando en:'},
  fr:{footer:'Non affilié à Mojang/Microsoft',notfound:'Post introuvable.',err:'Erreur lors du chargement.',back:'← Retour au Blog',translationNotice:'Ce post est disponible dans d\'autres langues:',noTranslation:'Contenu non disponible dans cette langue. Affichage en:'},
  de:{footer:'Nicht mit Mojang/Microsoft verbunden',notfound:'Post nicht gefunden.',err:'Fehler beim Laden des Posts.',back:'← Zurück zum Blog',translationNotice:'Dieser Post ist in anderen Sprachen verfügbar:',noTranslation:'Inhalt in dieser Sprache nicht verfügbar. Anzeige in:'},
};
const langMeta={pt:{flag:'🇧🇷',label:'PT',html:'pt-BR'},en:{flag:'🇺🇸',label:'EN',html:'en'},es:{flag:'🇪🇸',label:'ES',html:'es'},fr:{flag:'🇫🇷',label:'FR',html:'fr'},de:{flag:'🇩🇪',label:'DE',html:'de'}};
const LANGS=['pt','en','es','fr','de'];

let currentLang='pt', postFM=null;

function setLang(lang){
  currentLang=lang;
  const m=langMeta[lang];
  document.documentElement.lang=m.html;
  document.getElementById('currentFlag').textContent=m.flag;
  document.getElementById('currentLangLabel').textContent=m.label;
  document.querySelectorAll('.lang-option').forEach(el=>el.classList.toggle('active',el.getAttribute('data-lang')===lang));
  document.getElementById('footerCopy').textContent=i18n[lang].footer;
  closeLang();
  if(postFM) renderPost(postFM);
}
function toggleLang(){document.getElementById('langSwitcher').classList.toggle('open')}
function closeLang(){document.getElementById('langSwitcher').classList.remove('open')}
document.addEventListener('click',e=>{if(!document.getElementById('langSwitcher').contains(e.target))closeLang()});

const TAG_META={
  update:{emoji:'🚀',color:'var(--amber)'},guide:{emoji:'📖',color:'var(--green)'},
  devlog:{emoji:'🛠',color:'var(--red)'},news:{emoji:'📢',color:'var(--blue)'},
  release:{emoji:'🎉',color:'var(--green-lt)'},
};
const customTags=JSON.parse(localStorage.getItem('mms_custom_tags')||'[]');

function getTagMeta(tag){
  const ct=customTags.find(t=>t.value===tag);
  if(ct) return {emoji:'🏷',color:ct.color,custom:true};
  return TAG_META[tag]||TAG_META.news;
}

function parseFM(raw){
  const fm={};
  const match=raw.match(/^---\n([\s\S]*?)\n---/);
  if(match){
    match[1].split('\n').forEach(line=>{
      const[key,...val]=line.split(':');
      if(key) fm[key.trim()]=val.join(':').trim().replace(/^["']|["']$/g,'');
    });
    const rest=raw.slice(match[0].length);
    const parts=rest.split(/\n<!-- lang:(\w+) -->\n/);
    fm._body=parts[0].trim();
    for(let i=1;i<parts.length;i+=2) fm[`_body_${parts[i]}`]=(parts[i+1]||'').trim();
  } else { fm._body=raw; }
  return fm;
}

function getAvailableLangs(fm){
  return LANGS.filter(l=>fm[`title-${l}`]||fm[`_body_${l}`]||(l==='pt'&&(fm.title||fm._body)));
}

function getLangContent(fm,lang){
  const title=fm[`title-${lang}`]||(lang==='pt'?fm.title:'')||'';
  const excerpt=fm[`excerpt-${lang}`]||(lang==='pt'?fm.excerpt:'')||'';
  const body=fm[`_body_${lang}`]||(lang==='pt'?fm._body:'')||'';
  return {title,excerpt,body,available:!!(title||body)};
}

function formatDate(dateStr,lang){
  if(!dateStr) return '';
  const d=new Date(dateStr);
  const locales={pt:'pt-BR',en:'en-US',es:'es-ES',fr:'fr-FR',de:'de-DE'};
  return d.toLocaleDateString(locales[lang]||'pt-BR',{day:'numeric',month:'long',year:'numeric'});
}

function renderPost(fm){
  const avLangs=getAvailableLangs(fm);
  let displayLang=currentLang;
  let usingFallback=false,fallbackLang='pt';

  let content=getLangContent(fm,currentLang);
  if(!content.available){
    fallbackLang=avLangs[0]||'pt';
    content=getLangContent(fm,fallbackLang);
    usingFallback=true;
  }

  const tag=fm.tag||'news';
  const tm=getTagMeta(tag);
  const tagStyle=tm.custom?`style="background:${tm.color}22;color:${tm.color};border:1px solid ${tm.color}44"`:'' ;
  const tagClass=tm.custom?'custom':tag;

  document.title=`${content.title||fm.title||'Post'} — MMS Blog`;
  document.getElementById('breadSlug').textContent=content.title||fm.title||'post';

  // update dropdown to show unavailable
  document.querySelectorAll('.lang-option').forEach(el=>{
    const l=el.getAttribute('data-lang');
    const c=getLangContent(fm,l);
    el.classList.toggle('unavailable',!c.available);
    el.title=c.available?'':i18n[currentLang].noTranslation||'';
  });

  const flagMap={pt:'🇧🇷',en:'🇺🇸',es:'🇪🇸',fr:'🇫🇷',de:'🇩🇪'};

  // lang strip
  const langsStripHtml=avLangs.length>1?`
    <div class="post-langs-strip">
      <span class="post-langs-label">🌍</span>
      ${avLangs.map(l=>`<button class="post-lang-btn ${l===displayLang&&!usingFallback||l===fallbackLang&&usingFallback?'active':''}" onclick="setLang('${l}')">${flagMap[l]} ${l.toUpperCase()}</button>`).join('')}
    </div>`:'';

  const translationNoticeHtml=usingFallback?`
    <div class="translation-notice">
      ℹ️ ${i18n[currentLang]?.noTranslation||'Showing in:'} <strong>${flagMap[fallbackLang]} ${fallbackLang.toUpperCase()}</strong>
    </div>`:'';

  const bannerHtml=fm.banner?`<div class="post-banner"><img src="${fm.banner}" alt="${content.title}" /></div>`:'';
  const avatarHtml=fm.avatar?`<img src="${fm.avatar}" alt="${fm.author}" />`:`<div style="width:100%;height:100%;background:var(--bg3);display:grid;place-items:center;font-size:14px">👤</div>`;
  const backLang=usingFallback?fallbackLang:currentLang;

  document.getElementById('postContent').innerHTML=`
    <div class="post-header">
      ${langsStripHtml}
      ${translationNoticeHtml}
      <div class="post-meta">
        <span class="post-tag ${tagClass}" ${tagStyle}>${tm.emoji} ${tag}</span>
        <span class="post-date">${formatDate(fm.date,backLang)}</span>
      </div>
      <h1 class="post-title">${content.title||'Post'}</h1>
      ${content.excerpt?`<p class="post-excerpt">${content.excerpt}</p>`:''}
      <div class="post-author">
        <div class="post-author-avatar">${avatarHtml}</div>
        <div class="post-author-info">
          <div class="post-author-name">${fm.author||'MMS Team'}</div>
          <div class="post-author-role">Modly</div>
        </div>
      </div>
    </div>
    ${bannerHtml}
    <div class="post-body">${parseMarkdown(content.body)}</div>
    <a class="back-link" href="index.html">${i18n[currentLang]?.back||'← Back'}</a>
  `;
}

function parseMarkdown(md){
  if(!md) return '';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^#{6}\s+(.+)$/gm,'<h6>$1</h6>').replace(/^#{5}\s+(.+)$/gm,'<h5>$1</h5>')
    .replace(/^#{4}\s+(.+)$/gm,'<h4>$1</h4>').replace(/^#{3}\s+(.+)$/gm,'<h3>$1</h3>')
    .replace(/^#{2}\s+(.+)$/gm,'<h2>$1</h2>').replace(/^#{1}\s+(.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/```[\w]*\n([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" />')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^---+$/gm,'<hr />')
    .replace(/^&gt;\s+(.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^[\*\-]\s+(.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/^\d+\.\s+(.+)$/gm,'<li>$1</li>')
    .replace(/^(?!<[hupblt]).+$/gm,l=>l.trim()?`<p>${l}</p>`:'')
    .replace(/\n{3,}/g,'\n\n');
}

async function loadPost(slug){
  document.getElementById('breadSlug').textContent=slug;
  try{
    const r=await fetch(`${RAW_BASE}/${slug}.md`);
    if(!r.ok) throw new Error('not found');
    const raw=await r.text();
    postFM=parseFM(raw);
    // check if scheduled/draft
    const status=postFM.status||'published';
    if(status==='draft'){ document.getElementById('postContent').innerHTML=`<div class="error-box"><p style="font-size:32px;margin-bottom:12px">🔒</p><p>Este post ainda é um rascunho.</p></div><a class="back-link" href="index.html">← Blog</a>`; return; }
    if(status==='scheduled'){
      const schedDate=new Date(postFM.date+(postFM.sched_time?'T'+postFM.sched_time:''));
      if(schedDate>new Date()){ document.getElementById('postContent').innerHTML=`<div class="error-box"><p style="font-size:32px;margin-bottom:12px">🕐</p><p>Este post ainda não foi publicado.</p></div><a class="back-link" href="index.html">← Blog</a>`; return; }
    }
    renderPost(postFM);
  }catch(e){
    document.getElementById('postContent').innerHTML=`<div class="error-box"><p style="font-size:32px;margin-bottom:12px">😕</p><p>${i18n[currentLang].notfound}</p></div><a class="back-link" href="index.html">${i18n[currentLang].back}</a>`;
  }
}

// read lang from URL param too
const params=new URLSearchParams(window.location.search);
const slug=params.get('slug');
const urlLang=params.get('lang');
const bl=navigator.language.slice(0,2);
if(urlLang&&['pt','en','es','fr','de'].includes(urlLang)) currentLang=urlLang;
else if(['en','es','fr','de'].includes(bl)) currentLang=bl;
setLang(currentLang);

if(slug) loadPost(slug);
else document.getElementById('postContent').innerHTML=`<div class="error-box"><p>${i18n[currentLang].notfound}</p></div><a class="back-link" href="index.html">${i18n[currentLang].back}</a>`;
</script>
</body>
</html>
